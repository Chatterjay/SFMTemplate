<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SFM 3D 布局查看器</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #1a1a2e;
  --surface: #16213e;
  --surface2: #0f3460;
  --border: #1a3a5c;
  --text: #e0e0e0;
  --text-dim: #8899aa;
  --accent: #4a9eff;
  --accent2: #e94560;
  --ars: #8bc34a;
  --sfm: #ff9800;
  --ae: #03a9f4;
  --mc: #9e9e9e;
  --blockentity: #ffc107;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Header */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  z-index: 10;
}
.header h1 { font-size: 16px; font-weight: 600; letter-spacing: 0.5px; }
.header h1 span { color: var(--accent); }

.tabs {
  display: flex;
  gap: 4px;
}
.tab {
  padding: 8px 20px;
  border: 1px solid var(--border);
  border-radius: 6px 6px 0 0;
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 14px;
  transition: all .2s;
  border-bottom: none;
}
.tab:hover { color: var(--text); background: rgba(255,255,255,.03); }
.tab.active { color: var(--accent); background: var(--bg); border-color: var(--accent); }

/* Main layout */
.main {
  display: flex;
  flex: 1;
  min-height: 0;
}

/* Sidebar */
.sidebar {
  width: 260px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow: hidden;
}
.sidebar-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  font-weight: 600;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
}
.block-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}
.block-list::-webkit-scrollbar { width: 4px; }
.block-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.block-item {
  padding: 10px 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: background .15s;
  border-left: 3px solid transparent;
  font-size: 13px;
}
.block-item:hover { background: rgba(255,255,255,.03); }
.block-item.highlight { background: rgba(74,158,255,.08); border-left-color: var(--accent); }

.block-dot {
  width: 10px; height: 10px;
  border-radius: 2px;
  flex-shrink: 0;
}
.block-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.block-mod {
  font-size: 11px;
  padding: 2px 6px;
  border-radius: 3px;
  background: rgba(255,255,255,.06);
  color: var(--text-dim);
  white-space: nowrap;
}

/* Viewport */
.viewport {
  flex: 1;
  position: relative;
  cursor: grab;
}
.viewport:active { cursor: grabbing; }
.viewport canvas { display: block; }

/* Loading */
.loading {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px 32px;
  font-size: 14px;
  color: var(--text-dim);
  z-index: 5;
}
.loading.hidden { display: none; }

/* Tooltip */
.tooltip {
  position: absolute;
  pointer-events: none;
  background: var(--surface);
  border: 1px solid var(--accent);
  border-radius: 8px;
  padding: 12px 16px;
  max-width: 280px;
  z-index: 20;
  opacity: 0;
  transition: opacity .15s;
  box-shadow: 0 4px 20px rgba(0,0,0,.4);
}
.tooltip.visible { opacity: 1; }
.tooltip .tt-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.tooltip .tt-mod { font-size: 11px; color: var(--text-dim); margin-bottom: 6px; }
.tooltip .tt-desc { font-size: 12px; color: #bbb; line-height: 1.5; }

/* Focus indicator */
.focus-hint {
  position: absolute;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 12px;
  color: var(--text-dim);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 6px 14px;
  pointer-events: none;
  opacity: 0;
  transition: opacity .3s;
}
.focus-hint.visible { opacity: 1; }
</style>
</head>
<body>

<div class="header">
  <h1>SFM <span>3D</span> 布局查看器</h1>
  <div class="tabs">
    <button class="tab active" data-layout="灌注室">灌注室</button>
    <button class="tab" data-layout="附魔装置">附魔装置</button>
  </div>
</div>

<div class="main">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">方块列表</div>
    <div class="block-list" id="blockList"></div>
  </div>
  <div class="viewport" id="viewport">
    <div class="loading" id="loading">加载模型中...</div>
    <div class="tooltip" id="tooltip">
      <div class="tt-name" id="ttName"></div>
      <div class="tt-mod" id="ttMod"></div>
      <div class="tt-desc" id="ttDesc"></div>
    </div>
    <div class="focus-hint" id="focusHint">滚轮缩放 · 拖拽旋转 · 点击方块聚焦</div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ── DOM refs ──────────────────────────────────────
const viewport = document.getElementById('viewport');
const loadingEl = document.getElementById('loading');
const tooltip = document.getElementById('tooltip');
const ttName = document.getElementById('ttName');
const ttMod = document.getElementById('ttMod');
const ttDesc = document.getElementById('ttDesc');
const focusHint = document.getElementById('focusHint');
const blockList = document.getElementById('blockList');
const tabs = document.querySelectorAll('.tab');

// ── Block info ────────────────────────────────────
const BLOCK_INFO = {
  // Ars Nouveau
  'ars_nouveau:creative_source_jar': {
    name: '创意源罐', mod: 'Ars Nouveau', color: '#8bc34a',
    desc: '无限魔力源，为附魔装置和灌注室提供稳定的魔力供给。'
  },
  'ars_nouveau:imbuement_chamber': {
    name: '灌注室', mod: 'Ars Nouveau', color: '#8bc34a',
    desc: '核心合成方块，使用魔力将材料灌注为新的魔法物品。'
  },
  'ars_nouveau:arcane_core_emissive': {
    name: '奥术核心（发光）', mod: 'Ars Nouveau', color: '#8bc34a',
    desc: '附魔装置的核心发光部件，提供奥术能量场。'
  },
  'ars_nouveau:arcane_platform': {
    name: '奥术平台', mod: 'Ars Nouveau', color: '#8bc34a',
    desc: '附魔装置的支撑平台，用于放置待附魔的物品。'
  },
  'ars_nouveau:enchanting_apparatus': {
    name: '附魔装置', mod: 'Ars Nouveau', color: '#8bc34a',
    desc: '利用魔力为物品附加魔法效果的装置核心。'
  },
  // Block entities
  'blockentity:ars_nouveau:imbuement_chamber': {
    name: '灌注室（方块实体）', mod: 'Ars Nouveau', color: '#ffc107',
    desc: '记录灌注配方进度，存储合成过程中的中间数据。'
  },
  'blockentity:ars_nouveau:arcane_core': {
    name: '奥术核心（方块实体）', mod: 'Ars Nouveau', color: '#ffc107',
    desc: '存储附魔进度，管理奥术能量在多方块结构中的分配。'
  },
  'blockentity:ars_nouveau:enchanting_apparatus': {
    name: '附魔装置（方块实体）', mod: 'Ars Nouveau', color: '#ffc107',
    desc: '存储附魔配方数据，跟踪附魔过程中的物品变化。'
  },
  // ExtendedAE
  'extendedae:ex_pattern_provider': {
    name: 'ME 样板供应器', mod: 'Extended AE', color: '#03a9f4',
    desc: 'AE2 扩展设备，存储合成样板并按需将材料输出至目标容器。'
  },
  // Minecraft
  'minecraft:barrel': {
    name: '木桶', mod: 'Minecraft', color: '#9e9e9e',
    desc: '存储容器，拥有27格空间，可被 SFM 管理器读写。'
  },
  'minecraft:white_concrete': {
    name: '白色混凝土', mod: 'Minecraft', color: '#9e9e9e',
    desc: '建筑方块，用于搭建机器外壳与分隔区域。'
  },
  // SFM
  'sfm:cable': {
    name: 'SFM 线缆', mod: 'Super Factory Manager', color: '#ff9800',
    desc: '连接管理器与各个设备，传输物品和红石信号。'
  },
  'sfm:manager': {
    name: 'SFM 管理器', mod: 'Super Factory Manager', color: '#ff9800',
    desc: '管理自动化流程的核心方块，执行设定的输入输出逻辑。'
  },
};

// ── State ─────────────────────────────────────────
let currentLayout = '灌注室';
let currentModel = null;
let allBlocks = [];       // { id, name, mod, color, desc, meshes: [] }
let meshBlockMap = new Map(); // mesh -> block entry

// ── Three.js setup ────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color('#1a1a2e');
scene.fog = new THREE.Fog('#1a1a2e', 8, 40);

const camera = new THREE.PerspectiveCamera(50, 2, 0.1, 100);
camera.position.set(5, 3, 6);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.shadowMap.enabled = true;
viewport.appendChild(renderer.domElement);

// Lighting
const ambientLight = new THREE.AmbientLight('#8899cc', 2.5);
scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight('#ffffff', 4);
dirLight.position.set(5, 10, 7);
scene.add(dirLight);
const fillLight = new THREE.DirectionalLight('#8899cc', 1.5);
fillLight.position.set(-3, 2, -4);
scene.add(fillLight);

// Ground grid
const gridHelper = new THREE.PolarGridHelper(6, 32, 24, 128, '#1a3a5c', '#1a3a5c');
gridHelper.position.y = -3;
scene.add(gridHelper);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 1.5;
controls.maxDistance = 15;
controls.maxPolarAngle = Math.PI * 0.7;
controls.target.set(0, 0, 0);
controls.update();

// Loader
const loader = new GLTFLoader();

// Raycaster
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

// ── Model loading ─────────────────────────────────
const GLASS_BLOCKS = new Set([
  'ars_nouveau:creative_source_jar',
  'ars_nouveau:imbuement_chamber',
  'ars_nouveau:enchanting_apparatus',
  'ars_nouveau:arcane_core_emissive',
]);

function getModelPath(layout) {
  return layout === '灌注室' ? 'models/灌注室/scene.glb' : 'models/附魔装置/scene.gltf';
}

function getBlockId(mesh) {
  let name = mesh.name;
  if (!name && mesh.parent) name = mesh.parent.name;
  if (!name) return null;
  // Handle Three.js name dedup suffix (_1, _2, etc.)
  name = name.replace(/_\d+$/, '');
  return name;
}

async function loadModel(layout) {
  loadingEl.classList.remove('hidden');

  const path = getModelPath(layout);
  const gltf = await loader.loadAsync(path);

  const group = gltf.scene;
  const blockMap = new Map(); // blockId -> { id, meshes: [] }
  const allMeshBlockPairs = [];

  group.traverse(child => {
    if (!child.isMesh) return;
    const blockId = getBlockId(child);
    if (!blockId) return;

    if (!blockMap.has(blockId)) {
      blockMap.set(blockId, { id: blockId, meshes: [] });
    }
    blockMap.get(blockId).meshes.push(child);
    allMeshBlockPairs.push([child, blockId]);

    // Material setup
    if (child.material) {
      const mat = child.material;
      if (mat.map) {
        mat.map.minFilter = THREE.NearestFilter;
        mat.map.magFilter = THREE.NearestFilter;
        mat.map.generateMipmaps = false;
      }
      // For GLTF: set alpha mode for glass blocks
      if (path.endsWith('.gltf') && GLASS_BLOCKS.has(blockId)) {
        mat.transparent = true;
        mat.alphaTest = 0.1;
        mat.depthWrite = true;
        mat.needsUpdate = true;
      }
    }
  });

  // Build block list entries
  allBlocks = [];
  meshBlockMap.clear();

  for (const [blockId, entry] of blockMap) {
    const info = BLOCK_INFO[blockId] || {
      name: blockId, mod: 'Unknown', color: '#666666',
      desc: '未知方块，等待补充信息。'
    };
    const block = {
      id: blockId,
      name: info.name,
      mod: info.mod,
      color: info.color,
      desc: info.desc,
      meshes: entry.meshes,
    };
    allBlocks.push(block);
    for (const mesh of entry.meshes) {
      meshBlockMap.set(mesh, block);
    }
  }

  // Sort blocks: Ars Nouveau first, then by name
  allBlocks.sort((a, b) => {
    const aIsArs = a.mod === 'Ars Nouveau' ? 0 : 1;
    const bIsArs = b.mod === 'Ars Nouveau' ? 0 : 1;
    if (aIsArs !== bIsArs) return aIsArs - bIsArs;
    return a.name.localeCompare(b.name, 'zh');
  });

  // Center model
  const box = new THREE.Box3().setFromObject(group);
  const center = box.getCenter(new THREE.Vector3());
  group.position.sub(center);

  const size = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);
  const dist = maxDim * 1.8;
  camera.position.set(dist * 0.7, dist * 0.5, dist * 0.8);
  controls.target.set(0, 0, 0);
  controls.update();

  loadingEl.classList.add('hidden');
  return group;
}

// ── Sidebar rendering ─────────────────────────────
function renderSidebar() {
  blockList.innerHTML = '';
  for (const block of allBlocks) {
    const el = document.createElement('div');
    el.className = 'block-item';
    el.dataset.blockId = block.id;
    el.innerHTML = `
      <div class="block-dot" style="background:${block.color}"></div>
      <span class="block-name">${block.name}</span>
      <span class="block-mod">${block.mod}</span>
    `;
    el.addEventListener('click', () => focusBlock(block));
    el.addEventListener('mouseenter', () => highlightBlock(block, el));
    el.addEventListener('mouseleave', () => unhighlightBlock(el));
    blockList.appendChild(el);
  }
}

function highlightBlock(block, el) {
  el?.classList.add('highlight');
  for (const mesh of block.meshes) {
    mesh._origEmissive = mesh.material.emissive?.getHex();
    mesh._origEmissiveIntensity = mesh.material.emissiveIntensity;
    mesh.material.emissive = new THREE.Color(block.color);
    mesh.material.emissiveIntensity = 0.4;
  }
}

function unhighlightBlock(el) {
  el?.classList.remove('highlight');
  for (const block of allBlocks) {
    for (const mesh of block.meshes) {
      if (mesh.material.emissiveIntensity === 0.4) {
        mesh.material.emissiveIntensity = mesh._origEmissiveIntensity ?? 0;
        if (mesh._origEmissive !== undefined) {
          mesh.material.emissive?.setHex(mesh._origEmissive);
        }
      }
    }
  }
}

// ── Camera focus animation ────────────────────────
let focusAnim = null;

function focusBlock(block) {
  if (block.meshes.length === 0) return;
  const box = new THREE.Box3();
  for (const mesh of block.meshes) {
    box.expandByObject(mesh);
  }
  const target = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());
  const dist = Math.max(size.x, size.y, size.z) * 2.5;

  const startTarget = controls.target.clone();
  const endTarget = target;
  const startCam = camera.position.clone();
  const endCam = target.clone().add(
    new THREE.Vector3(dist * 0.6, dist * 0.4, dist * 0.7)
  );
  const startTime = performance.now();
  const duration = 800;

  function easeOutCubic(t) {
    return 1 - Math.pow(1 - t, 3);
  }

  function animateFocus(now) {
    const elapsed = now - startTime;
    const t = Math.min(elapsed / duration, 1);
    const et = easeOutCubic(t);
    controls.target.lerpVectors(startTarget, endTarget, et);
    camera.position.lerpVectors(startCam, endCam, et);
    controls.update();
    if (t < 1) {
      focusAnim = requestAnimationFrame(animateFocus);
    } else {
      focusAnim = null;
    }
  }

  if (focusAnim) cancelAnimationFrame(focusAnim);
  focusAnim = requestAnimationFrame(animateFocus);
  focusHint.classList.add('visible');
  setTimeout(() => focusHint.classList.remove('visible'), 2000);
}

// ── Raycaster hover ───────────────────────────────
let hoveredBlock = null;
let hoveredSidebarEl = null;

function onMouseMove(e) {
  const rect = viewport.getBoundingClientRect();
  mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects([...meshBlockMap.keys()], false);

  let newHovered = null;
  if (intersects.length > 0) {
    const obj = intersects[0].object;
    newHovered = meshBlockMap.get(obj) || null;
  }

  // Update sidebar highlight
  if (hoveredBlock !== newHovered) {
    unhighlightBlock(hoveredSidebarEl);
    hoveredBlock = newHovered;
    if (hoveredBlock) {
      hoveredSidebarEl = blockList.querySelector(`[data-block-id="${hoveredBlock.id}"]`);
      highlightBlock(hoveredBlock, hoveredSidebarEl);
    } else {
      hoveredSidebarEl = null;
    }
  }

  // Update tooltip
  if (hoveredBlock) {
    ttName.textContent = hoveredBlock.name;
    ttMod.textContent = hoveredBlock.mod;
    ttDesc.textContent = hoveredBlock.desc;
    tooltip.classList.add('visible');
    const tx = e.clientX - viewport.getBoundingClientRect().left + 16;
    const ty = e.clientY - viewport.getBoundingClientRect().top - 16;
    tooltip.style.left = Math.min(tx, viewport.clientWidth - 290) + 'px';
    tooltip.style.top = Math.max(ty, 8) + 'px';
  } else {
    tooltip.classList.remove('visible');
  }

  viewport.style.cursor = hoveredBlock ? 'pointer' : '';
}

function onClick(e) {
  if (e.target.tagName === 'BUTTON') return;
  if (hoveredBlock) {
    focusBlock(hoveredBlock);
  }
}

viewport.addEventListener('mousemove', onMouseMove, { passive: true });
viewport.addEventListener('click', onClick);

// ── Tab switching ─────────────────────────────────
async function switchLayout(layout) {
  if (layout === currentLayout && currentModel) return;
  currentLayout = layout;

  tabs.forEach(t => t.classList.toggle('active', t.dataset.layout === layout));

  // Remove old model
  if (currentModel) {
    scene.remove(currentModel);
    disposeModel(currentModel);
    currentModel = null;
  }
  allBlocks = [];
  meshBlockMap.clear();
  renderSidebar();

  // Load new model
  try {
    currentModel = await loadModel(layout);
    scene.add(currentModel);
    renderSidebar();
  } catch (err) {
    console.error('Failed to load model:', err);
    loadingEl.textContent = '加载失败: ' + err.message;
  }
}

function disposeModel(group) {
  group.traverse(child => {
    if (child.isMesh) {
      child.geometry?.dispose();
      if (child.material) {
        if (Array.isArray(child.material)) {
          child.material.forEach(m => disposeMaterial(m));
        } else {
          disposeMaterial(child.material);
        }
      }
    }
  });
}

function disposeMaterial(mat) {
  for (const key of Object.keys(mat)) {
    const val = mat[key];
    if (val && val.isTexture) {
      val.dispose();
    }
  }
  mat.dispose();
}

tabs.forEach(tab => {
  tab.addEventListener('click', () => switchLayout(tab.dataset.layout));
});

// ── Resize ────────────────────────────────────────
function resize() {
  const rect = viewport.getBoundingClientRect();
  renderer.setSize(rect.width, rect.height);
  camera.aspect = rect.width / Math.max(rect.height, 1);
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);

// ── Render loop ───────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

// ── Init ──────────────────────────────────────────
resize();
animate();

// Show focus hint briefly
setTimeout(() => focusHint.classList.add('visible'), 500);
setTimeout(() => focusHint.classList.remove('visible'), 4000);

// Load initial model
switchLayout('灌注室');
</script>
</body>
</html>
