<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SFM 模板 — 3D 布局查看器</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <h1><span>SFM</span> 模板</h1>
    <span class="badge">3D 布局查看器</span>
    <a class="header-link" href="https://www.mcmod.cn/class/23362.html" target="_blank" rel="noopener">MC百科</a>
    <a class="header-link" href="https://github.com/TeamDman/SuperFactoryManager" target="_blank"
      rel="noopener">GitHub</a>
    <div class="tabs">
      <button class="tab-btn active" data-model="灌注室">灌注室</button>
      <button class="tab-btn" data-model="附魔装置">附魔装置</button>
    </div>
    <button class="rotate-btn on" id="rotate-toggle">⟳ 自动旋转</button>
  </header>

  <div class="main-layout">
    <div id="canvas-container">
      <div id="loading">
        <div class="spinner"></div>
        <p>加载模型中...</p>
      </div>
      <div class="hint">拖拽旋转 · 滚轮缩放 · 悬停查看方块信息</div>
    </div>
    <div id="sidebar">
      <div class="sidebar-header">
        <span>方块列表</span>
        <span class="count" id="block-count">0</span>
      </div>
      <div class="sidebar-scroll" id="block-list"></div>
    </div>
  </div>

  <div id="tooltip">
    <div class="tooltip-inner"></div>
  </div>

  <script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { getBlockInfo, getModColor, SFM_CODE_FILES, TAB_LABELS, buildVisibleBlockentitySet, buildAlphaClipSet, buildHiddenMeshSet } from './config.js';

    const VISIBLE_BLOCKENTITIES = buildVisibleBlockentitySet();
    const ALPHA_CLIP_MESHES = buildAlphaClipSet();
    const HIDDEN_MESHES = buildHiddenMeshSet();

    const tabMdData = {};
    const labelSprites = [];

    /* ── DOM refs ── */
    const container = document.getElementById('canvas-container');
    const loadingEl = document.getElementById('loading');
    const tooltipEl = document.getElementById('tooltip');
    const tooltipInner = tooltipEl.querySelector('.tooltip-inner');
    const sidebarList = document.getElementById('block-list');
    const blockCountEl = document.getElementById('block-count');

    /* ── Scene Setup ── */
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    container.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(40, container.clientWidth / container.clientHeight, 0.1, 100);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.minDistance = 1;
    controls.maxDistance = 30;
    controls.target.set(0, 0, 0);
    controls.autoRotate = localStorage.getItem("sfm_auto_rotate") !== "false";
    controls.autoRotateSpeed = 2.0;

    /* ── Lighting ── */
    scene.add(new THREE.AmbientLight(0x404060, 0.6));
    scene.add(new THREE.HemisphereLight(0xffffbb, 0x080820, 0.8));

    const dirLight = new THREE.DirectionalLight(0xffffff, 2.0);
    dirLight.position.set(8, 12, 6);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 1024;
    dirLight.shadow.mapSize.height = 1024;
    dirLight.shadow.camera.near = 0.1;
    dirLight.shadow.camera.far = 30;
    dirLight.shadow.camera.left = -10;
    dirLight.shadow.camera.right = 10;
    dirLight.shadow.camera.top = 10;
    dirLight.shadow.camera.bottom = -10;
    dirLight.shadow.bias = -0.001;
    scene.add(dirLight);

    const fillLight = new THREE.DirectionalLight(0x8888ff, 0.4);
    fillLight.position.set(-4, 2, -6);
    scene.add(fillLight);

    /* ── Grid & Ground ── */
    const gridHelper = new THREE.PolarGridHelper(6, 32, 24, 128, '#1a3a5c', '#1a3a5c');
    gridHelper.position.y = -1.1;
    scene.add(gridHelper);

    // Shadow-receiving ground plane
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(14, 14),
      new THREE.ShadowMaterial({ opacity: 0.25 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -1.1;
    ground.receiveShadow = true;
    scene.add(ground);

    /* ── GLTF Loader ── */
    const loader = new GLTFLoader();
    const modelGroups = {};
    let activeModel = '灌注室';
    let currentScene = null;
    let allMeshes = [];

    /* ── Hover State ── */
    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();
    let hoveredOriginalMaterials = null;
    let currentTooltipTarget = null;
    let tooltipPinned = false;

    /* ── Highlight ── */
    function highlightMesh(mesh) {
      if (!mesh || !mesh.isMesh) return;
      const materials = Array.isArray(mesh.material) ? mesh.material : [mesh.material];
      hoveredOriginalMaterials = materials.map(m => ({
        emissive: m.emissive ? m.emissive.clone() : null,
        intensity: m.emissiveIntensity ?? 0,
      }));
      materials.forEach(m => {
        if (m.emissive) { m.emissive.setHex(0x4488ff); m.emissiveIntensity = 0.35; }
      });
    }

    function unhighlightMesh(mesh) {
      if (!mesh || !mesh.isMesh || !hoveredOriginalMaterials) return;
      const materials = Array.isArray(mesh.material) ? mesh.material : [mesh.material];
      materials.forEach((m, i) => {
        const o = hoveredOriginalMaterials[i];
        if (o && m.emissive) { m.emissive.copy(o.emissive || new THREE.Color(0)); m.emissiveIntensity = o.intensity; }
      });
      hoveredOriginalMaterials = null;
    }

    /* ── Tooltip ── */
    function buildTooltipHtml(info, meshName) {
      const md = tabMdData[activeModel];
      const sfmCode = info.sfmCode || (info.tabSfmCode && md ? md.sfmCode : null);
      const codeHtml = sfmCode ? `
    <div class="tooltip-code">
      <div class="tooltip-code-header">
        <span>SFM 代码</span>
        <button onclick="navigator.clipboard.writeText(this.parentElement.nextElementSibling.textContent);this.textContent='已复制';setTimeout(()=>this.textContent='复制',1500)">复制</button>
      </div>
      <pre>${sfmCode}</pre>
    </div>` : '';
      const ppText = info.tabPatternProvider && md ? md.patternProvider : null;
      const ppHtml = ppText ? `
    <div class="tooltip-code">
      <div class="tooltip-code-header">
        <span>样板供应器设置</span>
      </div>
      <pre>${ppText}</pre>
    </div>` : '';
      return `
    <div class="tooltip-head">
      <div class="tooltip-name">${info.name}</div>
      <div class="tooltip-mod" style="color:${getModColor(info.mod)}">${info.mod}</div>
    </div>
    <div class="tooltip-body">
      ${info.desc ? `<div class="tooltip-desc">${info.desc}</div>` : ''}
      <div class="tooltip-id">${meshName}</div>
      ${codeHtml}
      ${ppHtml}
    </div>
  `;
    }

    function showTooltip(mesh, event) {
      tooltipInner.innerHTML = buildTooltipHtml(getBlockInfo(mesh.name), mesh.name);
      positionTooltip(event);
      tooltipEl.classList.add('visible');
    }

    function positionTooltip(event) {
      const tw = Math.min(280, window.innerWidth - 32);
      const th = tooltipEl.offsetHeight || 100;
      let tx = event.clientX + 16;
      let ty = event.clientY + 16;
      if (tx + tw > window.innerWidth - 16) tx = event.clientX - tw - 16;
      if (ty + th > window.innerHeight - 16) ty = window.innerHeight - th - 16;
      tooltipEl.style.left = Math.max(16, tx) + 'px';
      tooltipEl.style.top = Math.max(16, ty) + 'px';
    }

    function hideTooltip() {
      tooltipPinned = false;
      tooltipEl.classList.remove('visible', 'pinned');
    }

    /* ── Block Labels ── */
    function createLabelSprite(text) {
      const canvas = document.createElement('canvas');
      canvas.width = 128;
      canvas.height = 64;
      const ctx = canvas.getContext('2d');
      // Rounded rect background
      const r = 16;
      ctx.beginPath();
      ctx.moveTo(r, 0);
      ctx.lineTo(128 - r, 0);
      ctx.quadraticCurveTo(128, 0, 128, r);
      ctx.lineTo(128, 64 - r);
      ctx.quadraticCurveTo(128, 64, 128 - r, 64);
      ctx.lineTo(r, 64);
      ctx.quadraticCurveTo(0, 64, 0, 64 - r);
      ctx.lineTo(0, r);
      ctx.quadraticCurveTo(0, 0, r, 0);
      ctx.closePath();
      ctx.fillStyle = 'rgba(233,69,96,0.88)';
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 28px "Noto Sans SC", "Microsoft YaHei", sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, 64, 33);
      const tex = new THREE.CanvasTexture(canvas);
      tex.needsUpdate = true;
      const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false });
      const sprite = new THREE.Sprite(mat);
      sprite.scale.set(1.0, 0.5, 1);
      return sprite;
    }

    const labelOrigMats = [];

    function highlightLabelMeshes() {
      unhighlightLabelMeshes();
      const labels = TAB_LABELS[activeModel];
      if (!labels) return;
      for (const entry of labels) {
        let found = null;
        for (const meshName of entry.meshes) {
          found = allMeshes.find(m =>
            m.name === meshName || m.name === meshName.replace(/:/g, '')
          );
          if (found) break;
        }
        if (!found) continue;
        // Glow the block (green, distinct from hover blue)
        const mats = Array.isArray(found.material) ? found.material : [found.material];
        labelOrigMats.push({
          mesh: found,
          materials: mats.map(m => ({
            emissive: m.emissive ? m.emissive.clone() : null,
            intensity: m.emissiveIntensity ?? 0
          }))
        });
        mats.forEach(m => {
          if (m.emissive) { m.emissive.setHex(0x44dd44); m.emissiveIntensity = 0.45; }
        });
        // Place label at block top-center (world-space bounding box)
        const box = new THREE.Box3().setFromObject(found);
        const ctr = box.getCenter(new THREE.Vector3());
        const siz = box.getSize(new THREE.Vector3());
        ctr.y += siz.y / 2 + 0.2;
        const sprite = createLabelSprite(entry.label);
        sprite.position.copy(ctr);
        scene.add(sprite);
        labelSprites.push(sprite);
      }
    }

    function unhighlightLabelMeshes() {
      for (const entry of labelOrigMats) {
        const mats = Array.isArray(entry.mesh.material) ? entry.mesh.material : [entry.mesh.material];
        mats.forEach((m, i) => {
          const o = entry.materials[i];
          if (o && m.emissive) { m.emissive.copy(o.emissive || new THREE.Color(0)); m.emissiveIntensity = o.intensity; }
        });
      }
      labelOrigMats.length = 0;
      for (const s of labelSprites) scene.remove(s);
      labelSprites.length = 0;
    }

    /* ── Raycaster ── */
    function getMeshUnderPointer(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(pointer, camera);
      if (!allMeshes.length) return null;
      const hits = raycaster.intersectObjects(allMeshes);
      return hits.length > 0 ? hits[0].object : null;
    }

    /* ── Sidebar ── */
    function buildSidebar(meshes) {
      sidebarList.innerHTML = '';
      const seen = new Set();
      const items = [];

      meshes.forEach(m => {
        if (!m.name || seen.has(m.name)) return;
        seen.add(m.name);
        const info = getBlockInfo(m.name);
        const color = getModColor(info.mod);
        items.push({ name: m.name, info, color, mesh: m });
      });

      items.forEach(item => {
        const el = document.createElement('div');
        el.className = 'block-item';
        el.dataset.name = item.name;
        el.innerHTML = `
      <span class="block-dot" style="background:${item.color}"></span>
      <span class="block-name">${item.info.name}</span>
      <span class="block-mod" style="color:${item.color}">${item.info.mod}</span>
    `;
        el.addEventListener('click', () => focusMesh(item.mesh, item.name));
        el.addEventListener('mouseenter', () => {
          if (tooltipPinned) {
            // Pinned mode: just highlight the hovered mesh, keep tooltip
            highlightMesh(item.mesh);
          } else {
            unhighlightMesh(currentTooltipTarget);
            hideTooltip();
            currentTooltipTarget = item.mesh;
            highlightMesh(item.mesh);
          }
        });
        el.addEventListener('mouseleave', () => {
          if (tooltipPinned) {
            // Pinned mode: un-hover the sidebar item, restore pinned highlight
            unhighlightMesh(item.mesh);
            highlightMesh(currentTooltipTarget);
          } else if (currentTooltipTarget === item.mesh) {
            unhighlightMesh(currentTooltipTarget);
            hideTooltip();
            currentTooltipTarget = null;
          }
        });
        sidebarList.appendChild(el);
      });

      blockCountEl.textContent = items.length;
      updateSidebarActive(null);
    }

    function updateSidebarActive(name) {
      sidebarList.querySelectorAll('.block-item').forEach(el => {
        el.classList.toggle('active', el.dataset.name === name);
      });
    }

    function focusMesh(mesh, name) {
      if (!mesh) return;
      // Clear previous highlight first
      unhighlightMesh(currentTooltipTarget);
      hideTooltip();
      // Compute world position of the mesh
      const center = new THREE.Vector3();
      mesh.getWorldPosition(center);

      // Use bounding box center if available
      if (mesh.geometry?.boundingBox) {
        const local = mesh.geometry.boundingBox.getCenter(new THREE.Vector3());
        center.add(local);
      }

      // Animate controls target to the mesh position
      const startTarget = controls.target.clone();
      const startPos = camera.position.clone();
      const dir = startPos.clone().sub(startTarget).normalize();
      const dist = startPos.distanceTo(startTarget);

      const endTarget = center;
      const endPos = center.clone().add(dir.multiplyScalar(dist));

      const duration = 400;
      const startTime = performance.now();

      function animateCamera(time) {
        const t = Math.min((time - startTime) / duration, 1);
        const ease = 1 - Math.pow(1 - t, 3); // easeOutCubic

        controls.target.lerpVectors(startTarget, endTarget, ease);
        camera.position.lerpVectors(startPos, endPos, ease);
        controls.update();

        if (t < 1) requestAnimationFrame(animateCamera);
      }
      requestAnimationFrame(animateCamera);

      // Highlight in sidebar
      updateSidebarActive(name);

      // Show/hide block labels
      const isManager = name === 'sfm:manager' || name === 'sfmmanager';
      if (isManager) {
        highlightLabelMeshes();
      } else {
        unhighlightLabelMeshes();
      }

      // Show tooltip
      tooltipInner.innerHTML = buildTooltipHtml(getBlockInfo(name), name);
      tooltipEl.style.left = (sidebarList.getBoundingClientRect().left - 296) + 'px';
      tooltipEl.style.top = '100px';
      tooltipEl.classList.add('visible', 'pinned');
      tooltipPinned = true;

      highlightMesh(mesh);
      currentTooltipTarget = mesh;
    }

    /* ── Load Model ── */
    async function loadModel(name) {
      loadingEl.classList.remove('hidden');
      try {
        // Prefer .glb (Blender export), fall back to .gltf (VoxelBridge export)
        const ext = await fetch(`models/${name}/scene.glb`, { method: 'HEAD' }).then(r => r.ok ? 'glb' : 'gltf');
        const gltf = await loader.loadAsync(`models/${name}/scene.${ext}`);
        const group = gltf.scene;

        group.traverse(child => {
          if (!child.isMesh) return;
          if (!child.name && child.parent?.name) child.name = child.parent.name;
          // Hide outer shells with UV collapse (use blockentity version instead)
          if (HIDDEN_MESHES.has(child.name)) {
            child.visible = false;
            return;
          }
          // Hide other blockentity meshes to avoid z-fighting
          if (child.name && child.name.startsWith('blockentity') && !VISIBLE_BLOCKENTITIES.has(child.name)) {
            child.visible = false;
            return;
          }
          // Alpha Clip for meshes with zero-alpha pixels in the atlas
          if (ALPHA_CLIP_MESHES.has(child.name)) {
            child.material.alphaTest = 0.5;
            child.material.transparent = false;
            child.material.depthWrite = true;
            child.material.needsUpdate = true;
          }
          // 所有可见网格投射阴影
          if (child.visible) {
            child.castShadow = true;
            child.receiveShadow = true;
          }
        });

        const box = new THREE.Box3().setFromObject(group);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        group.position.sub(center);
        group.position.y += 0.5; // 抬高半个方块

        controls.target.set(0, 0, 0);
        const maxDim = Math.max(size.x, size.y, size.z);
        const dist = maxDim * 1.6;
        camera.position.set(dist * 0.7, dist * 0.5, dist * 0.8);
        controls.update();

        group.rotation.y = -Math.PI / 6;

        return group;
      } finally {
        loadingEl.classList.add('hidden');
      }
    }

    /* ── Switch Model ── */
    async function switchModel(name) {
      if (activeModel === name && currentScene) return;

      unhighlightMesh(currentTooltipTarget);
      hideTooltip();
      unhighlightLabelMeshes();
      currentTooltipTarget = null;
      if (currentScene) scene.remove(currentScene);
      allMeshes = [];

      const collectMeshes = (group) => {
        group.traverse(c => {
          if (c.isMesh && (c.visible || VISIBLE_BLOCKENTITIES.has(c.name))) allMeshes.push(c);
        });
      };

      if (modelGroups[name]) {
        currentScene = modelGroups[name];
        scene.add(currentScene);
        collectMeshes(currentScene);
      } else {
        try {
          const group = await loadModel(name);
          modelGroups[name] = group;
          currentScene = group;
          scene.add(currentScene);
          collectMeshes(group);
        } catch (err) {
          console.error(err);
          loadingEl.querySelector('p').textContent = '模型加载失败，请刷新重试';
          return;
        }
      }

      activeModel = name;
      localStorage.setItem('sfm_active_model', name);
      buildSidebar(allMeshes);

      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.model === name);
      });
    }

    /* ── Events ── */
    let tooltipHideTimer = null;

    container.addEventListener('pointermove', (event) => {
      if (!currentScene || !allMeshes.length) return;
      const mesh = getMeshUnderPointer(event);

      if (mesh !== currentTooltipTarget) {
        if (mesh) {
          if (tooltipHideTimer) { clearTimeout(tooltipHideTimer); tooltipHideTimer = null; }
          unhighlightMesh(currentTooltipTarget);
          hideTooltip();
          currentTooltipTarget = mesh;
          highlightMesh(mesh);
          showTooltip(mesh, event);
        } else if (currentTooltipTarget) {
          if (!tooltipPinned) {
            if (!tooltipHideTimer) {
              tooltipHideTimer = setTimeout(() => {
                unhighlightMesh(currentTooltipTarget);
                hideTooltip();
                currentTooltipTarget = null;
                tooltipHideTimer = null;
              }, 200);
            }
          }
        }
        updateSidebarActive(tooltipPinned && currentTooltipTarget ? currentTooltipTarget.name : (mesh?.name || null));
      } else if (mesh) {
        positionTooltip(event);
      }
    });

    container.addEventListener('pointerleave', () => {
      if (tooltipPinned) return;
      if (tooltipHideTimer) { clearTimeout(tooltipHideTimer); tooltipHideTimer = null; }
      unhighlightMesh(currentTooltipTarget);
      hideTooltip();
      currentTooltipTarget = null;
    });

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => switchModel(btn.dataset.model));
    });

    /* ── Auto-rotate Toggle ── */
    const rotateBtn = document.getElementById('rotate-toggle');
    // Sync visual state with loaded preference
    rotateBtn.classList.toggle('on', controls.autoRotate);
    rotateBtn.textContent = controls.autoRotate ? '⟳ 自动旋转' : '⟳ 已暂停';
    rotateBtn.addEventListener('click', () => {
      controls.autoRotate = !controls.autoRotate;
      localStorage.setItem('sfm_auto_rotate', controls.autoRotate);
      rotateBtn.classList.toggle('on', controls.autoRotate);
      rotateBtn.textContent = controls.autoRotate ? '⟳ 自动旋转' : '⟳ 已暂停';
    });

    /* ── Resize ── */
    function resize() {
      const w = container.clientWidth;
      const h = container.clientHeight;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    }
    window.addEventListener('resize', resize);

    /* ── Animation Loop ── */
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    /* ── Start ── */
    // Restore last active tab from localStorage
    const savedModel = localStorage.getItem('sfm_active_model') || '灌注室';
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.model === savedModel);
    });
    // Pre-load SFM codes and pattern provider settings from markdown files
    (async () => {
      for (const [tab, path] of Object.entries(SFM_CODE_FILES)) {
        try {
          const r = await fetch(path);
          const t = await r.text();
          const sfmM = t.match(/```sfm\n?([\s\S]*?)```/);
          const ppM = t.match(/## 样板供应器设置\n([\s\S]*?)(?=\n## |$)/);
          tabMdData[tab] = {
            sfmCode: sfmM ? sfmM[1].trim() : null,
            patternProvider: ppM ? ppM[1].trim() : null
          };
        } catch { tabMdData[tab] = { sfmCode: null, patternProvider: null }; }
      }
    })();

    switchModel(savedModel);
  </script>
</body>

</html>
