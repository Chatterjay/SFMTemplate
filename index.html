<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SFM 模板 — 3D 布局查看器</title>
  <link rel="stylesheet" href="styles/style.css">
</head>

<body>

  <header>
    <h1><span>SFM</span> 模板</h1>
    <span class="badge">3D 布局查看器</span>
    <a class="header-link" href="https://github.com/Chatterjay/SFMTemplate" target="_blank" rel="noopener">GitHub</a>
    <div class="tabs"></div>
    <button class="rotate-btn on" id="rotate-toggle">⟳ 自动旋转</button>
  </header>

  <div class="main-layout">
    <div id="canvas-container">
      <div id="loading">
        <div class="spinner"></div>
        <p>加载模型中...</p>
      </div>
      <div class="hint">拖拽旋转 · 滚轮缩放 · 悬停查看方块信息</div>
    </div>
    <div id="sidebar">
      <div class="sidebar-header">
        <span>方块列表</span>
        <span class="count" id="block-count">0</span>
      </div>
      <div class="sidebar-scroll" id="block-list"></div>
    </div>
  </div>

  <div id="tooltip">
    <div class="tooltip-inner"></div>
  </div>

  <script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
    "fuse.js": "https://unpkg.com/fuse.js@7.0.0/dist/fuse.mjs"
  }
}
</script>

  <script type="module" src="src/app/index.js"></script>
</body>

</html>
